<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE CONTROLE DE MULTAS</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: #333;
        }

        /* Cabeçalho Estilo Site */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            opacity: 0.8;
            margin-top: 10px;
        }

        .main-content {
            max-width: 900px;
            margin: -30px auto 50px;
            padding: 0 20px;
        }

        /* Mensagem de Confirmação */
        #alert-success {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        /* Formulário e Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary-color); }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }

        button:hover { background-color: #2980b9; transform: translateY(-2px); }

        /* Tabela de Histórico */
        .history-section h3 {
            border-left: 5px solid var(--accent-color);
            padding-left: 10px;
            color: var(--primary-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th { background-color: #f8f9fa; color: var(--primary-color); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<header>
    <h1>SISTEMA DE CONTROLE DE MULTAS</h1>
    <p>Portal Administrativo de Gestão de Infrações e Condutores</p>
</header>

<div class="main-content">
    <!-- Alerta de Sucesso -->
    <div id="alert-success">✓ Cadastro realizado com sucesso no sistema!</div>

    <div class="card">
        <h3>Novo Cadastro de Condutor</h3>
        <form id="cadastroForm">
            <div class="form-grid">
                <div class="full-width">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>
                <div>
                    <label>CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>
                <div>
                    <label>CNH</label>
                    <input type="text" id="cnh" placeholder="Número do documento" required>
                </div>
                <div class="full-width">
                    <button type="submit">Finalizar Cadastro</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Seção de Histórico -->
    <div class="card history-section">
        <h3>Histórico Recente</h3>
        <table id="tabelaHistorico">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>CNH</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dados aparecerão aqui -->
                <tr>
                    <td>Exemplo de Teste</td>
                    <td>123.456.789-00</td>
                    <td>99887766</td>
                    <td><span style="color: green;">Ativo</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('cadastroForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Pegar valores
        const nome = document.getElementById('nome').value;
        const cpf = document.getElementById('cpf').value;
        const cnh = document.getElementById('cnh').value;

        // Mostrar Alerta Verde
        const alerta = document.getElementById('alert-success');
        alerta.style.display = 'block';

        // Adicionar ao Histórico (Tabela)
        const tabela = document.getElementById('tabelaHistorico').getElementsByTagName('tbody')[0];
        const novaLinha = tabela.insertRow(0); // Adiciona no topo
        
        novaLinha.innerHTML = `
            <td>${nome}</td>
            <td>${cpf}</td>
            <td>${cnh}</td>
            <td><span style="color: green;">Ativo</span></td>
        `;

        // Limpar formulário
        this.reset();

        // Esconder alerta após 3 segundos
        setTimeout(() => {
            alerta.style.display = 'none';
        }, 3000);
    });
</script>

</body>
</html>
